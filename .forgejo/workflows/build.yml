name: Build

on:
  push:
  pull_request:

jobs:
  build-linux:
    runs-on: codeberg-medium

    container:
      image: rust:1.88-bookworm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            pkg-config \
            build-essential \
            libxkbcommon-dev \
            libwayland-dev \
            libgtk-3-dev

      - name: Verify toolchain
        run: |
          rustc --version
          cargo --version

      - name: Build release
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/release/game-save-scanner dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-save-scanner-linux
          path: dist/